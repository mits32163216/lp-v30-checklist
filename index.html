<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#3b5bdb">
  <meta name="description" content="v30 LPファイナル修正チェックリスト（AI自動判定・全26件）">
  <title>v30 LPファイナル修正チェックリスト</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icon-192.png">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #3b5bdb;
      --primary-dark: #2f4ac7;
      --bg: #f0f4ff;
      --card: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #555577;
      --border: #dde3f8;
      --done-bg: #f5f7ff;
      --done-text: #999;
      --badge-done: #2f9e44;
      --badge-done-bg: #d3f9d8;
      --shadow: 0 2px 8px rgba(59,91,219,0.08);
      --gap: 20px;
      --gap-sm: 10px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* ===== STICKY HEADER ===== */
    #app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--primary);
      color: #fff;
      padding: 14px var(--gap);
      display: flex;
      align-items: center;
      gap: var(--gap-sm);
      box-shadow: 0 2px 12px rgba(59,91,219,0.25);
    }

    #app-header h1 {
      font-size: 15px;
      font-weight: 700;
      flex: 1;
      line-height: 1.3;
    }

    #progress-ring-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    #progress-ring {
      width: 40px;
      height: 40px;
      transform: rotate(-90deg);
    }

    #progress-ring .bg { fill: none; stroke: rgba(255,255,255,0.25); stroke-width: 3; }
    #progress-ring .fg { fill: none; stroke: #fff; stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.4s ease; }

    #progress-text {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
      text-align: center;
    }

    #progress-text .count { font-size: 18px; display: block; }

    #reset-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.35);
      color: #fff;
      font-family: inherit;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    #reset-btn:hover { background: rgba(255,255,255,0.25); }

    /* ===== MAIN CONTENT ===== */
    #main {
      max-width: 680px;
      margin: 0 auto;
      padding: var(--gap);
    }

    /* ===== SECTION CARD ===== */
    .section-card {
      background: var(--card);
      border-radius: 12px;
      box-shadow: var(--shadow);
      margin-bottom: var(--gap);
      overflow: hidden;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px var(--gap);
      cursor: pointer;
      user-select: none;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .section-header:hover { background: #f8f9ff; }

    .section-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      flex: 1;
    }

    .section-counter {
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }

    .badge-done {
      font-size: 11px;
      font-weight: 700;
      color: var(--badge-done);
      background: var(--badge-done-bg);
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }

    .chevron {
      font-size: 12px;
      color: var(--text-secondary);
      transition: transform 0.25s;
      flex-shrink: 0;
    }
    .section-card.collapsed .chevron { transform: rotate(-90deg); }

    .steps-list {
      overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .section-card.collapsed .steps-list { max-height: 0 !important; }

    /* ===== STEP ITEM ===== */
    .step-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px var(--gap);
      border-bottom: 1px solid var(--border);
      min-height: 44px;
      transition: background 0.15s;
      cursor: pointer;
    }
    .step-item:last-child { border-bottom: none; }
    .step-item:hover { background: #fafbff; }

    .step-item.done {
      background: #1a1a1a;
      color: #fff;
    }

    .step-checkbox {
      appearance: none;
      -webkit-appearance: none;
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-radius: 6px;
      flex-shrink: 0;
      cursor: pointer;
      margin-top: 1px;
      background: #fff;
      position: relative;
      transition: border-color 0.15s, background 0.15s;
    }
    .step-checkbox:checked {
      background: #2e7d32;
      border-color: #2e7d32;
    }
    .step-checkbox:checked::after {
      content: '';
      position: absolute;
      top: 4px; left: 8px;
      width: 9px; height: 14px;
      border: 3px solid #fff;
      border-top: none; border-left: none;
      transform: rotate(40deg);
    }

    .step-body {
      flex: 1;
      pointer-events: none;
    }

    .step-num {
      font-size: 10px;
      color: var(--text-secondary);
      font-weight: 500;
      display: block;
      margin-bottom: 2px;
    }

    .step-title {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.4;
      display: block;
    }
    .done .step-title { color: #fff; }
    .done .step-num { color: rgba(255,255,255,0.6); }

    .step-desc {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
      line-height: 1.5;
      display: block;
    }
    .done .step-desc { color: rgba(255,255,255,0.7); }

    /* ===== LOADING / ERROR ===== */
    #loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* ===== COMPLETION BANNER ===== */
    #completion-banner {
      display: none;
      background: linear-gradient(135deg, #2f9e44, #37b24d);
      color: #fff;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: var(--gap);
      box-shadow: 0 4px 16px rgba(47,158,68,0.25);
    }
    #completion-banner.visible { display: block; }
    #completion-banner h2 { font-size: 18px; margin-bottom: 4px; }
    #completion-banner p { font-size: 13px; opacity: 0.9; }
  </style>
</head>
<body>

<!-- STICKY HEADER -->
<header id="app-header">
  <h1>v30 LP<br>修正チェックリスト</h1>
  <div id="progress-ring-wrap">
    <svg id="progress-ring" viewBox="0 0 40 40">
      <circle class="bg" cx="20" cy="20" r="17"/>
      <circle class="fg" id="ring-fg" cx="20" cy="20" r="17"
        stroke-dasharray="106.8" stroke-dashoffset="106.8"/>
    </svg>
    <div id="progress-text">
      <span class="count" id="count-done">0</span>
      <span>/ <span id="count-total">26</span></span>
    </div>
  </div>
  <button id="reset-btn" onclick="confirmReset()">リセット</button>
</header>

<main id="main">
  <div id="completion-banner">
    <h2>🎉 全26件確認完了！</h2>
    <p>v30 LPファイナル修正チェックリストを確認しました。</p>
  </div>
  <div id="loading">読み込み中...</div>
</main>

<script>
const STORAGE_KEY = 'lp-v30-checklist-progress';
let stepsData = null;
let checkedIds = new Set();

// ===== localStorage =====
function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      checkedIds = new Set(parsed.checkedIds || []);
    }
  } catch (e) { checkedIds = new Set(); }
}

function saveProgress() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ checkedIds: Array.from(checkedIds) }));
}

// ===== RESET =====
function confirmReset() {
  if (confirm('チェック状態をすべてリセットしますか？')) {
    checkedIds.clear();
    saveProgress();
    renderAll();
  }
}

// ===== PROGRESS RING =====
function updateProgress() {
  const total = stepsData ? stepsData.totalSteps : 26;
  const done = checkedIds.size;
  document.getElementById('count-done').textContent = done;
  document.getElementById('count-total').textContent = total;

  const r = 17;
  const circ = 2 * Math.PI * r;
  const pct = total > 0 ? done / total : 0;
  document.getElementById('ring-fg').style.strokeDashoffset = circ * (1 - pct);

  // Completion banner
  const banner = document.getElementById('completion-banner');
  if (done === total && total > 0) {
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }
}

// ===== TOGGLE STEP =====
function toggleStep(id) {
  if (checkedIds.has(id)) {
    checkedIds.delete(id);
  } else {
    checkedIds.add(id);
  }
  saveProgress();
  renderAll();
}

// ===== RENDER =====
function renderAll() {
  if (!stepsData) return;
  const main = document.getElementById('main');
  main.innerHTML = '';

  // Completion banner
  const banner = document.createElement('div');
  banner.id = 'completion-banner';
  const done = checkedIds.size;
  const total = stepsData.totalSteps;
  if (done === total && total > 0) banner.classList.add('visible');
  banner.innerHTML = '<h2>🎉 全26件確認完了！</h2><p>v30 LPファイナル修正チェックリストを確認しました。</p>';
  main.appendChild(banner);

  stepsData.sections.forEach((section) => {
    const sectionDone = section.steps.filter(s => checkedIds.has(s.id)).length;
    const sectionTotal = section.steps.length;
    const allDone = sectionDone === sectionTotal;

    const card = document.createElement('div');
    card.className = 'section-card';
    card.dataset.sectionId = section.id;

    // Header
    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `
      <span class="section-num">${section.id}</span>
      <span class="section-title">${section.title}</span>
      ${allDone ? '<span class="badge-done">完了</span>' : `<span class="section-counter">${sectionDone}/${sectionTotal}</span>`}
      <span class="chevron">▼</span>
    `;
    header.addEventListener('click', () => {
      card.classList.toggle('collapsed');
      // store collapse state
      const colKey = 'lp-v30-checklist-collapsed';
      let colSet = new Set();
      try { colSet = new Set(JSON.parse(localStorage.getItem(colKey) || '[]')); } catch {}
      if (card.classList.contains('collapsed')) {
        colSet.add(section.id);
      } else {
        colSet.delete(section.id);
      }
      localStorage.setItem(colKey, JSON.stringify(Array.from(colSet)));
    });
    card.appendChild(header);

    // Steps list
    const list = document.createElement('div');
    list.className = 'steps-list';

    section.steps.forEach((step) => {
      const isDone = checkedIds.has(step.id);
      const item = document.createElement('div');
      item.className = 'step-item' + (isDone ? ' done' : '');
      item.innerHTML = `
        <input type="checkbox" class="step-checkbox" ${isDone ? 'checked' : ''} aria-label="${step.title}">
        <div class="step-body">
          <span class="step-num">STEP ${step.id}</span>
          <span class="step-title">${step.title}</span>
          <span class="step-desc">${step.description}</span>
        </div>
      `;
      item.addEventListener('click', (e) => {
        e.preventDefault();
        toggleStep(step.id);
      });
      list.appendChild(item);
    });

    // Set natural height for animation
    card.appendChild(list);
    main.appendChild(card);

    // After append: measure height and set max-height
    requestAnimationFrame(() => {
      list.style.maxHeight = list.scrollHeight + 'px';
      // Restore collapsed state
      try {
        const colSet = new Set(JSON.parse(localStorage.getItem('lp-v30-checklist-collapsed') || '[]'));
        if (colSet.has(section.id)) {
          card.classList.add('collapsed');
        }
      } catch {}
    });
  });

  updateProgress();
}

// ===== STEPS DATA（直書き・fetch廃止） =====
const STEPS_DATA = {"workflow":"v30 LPファイナル修正チェックリスト","totalSteps":26,"sections":[{"id":1,"title":"AI判定可能・確認OK（24件）","steps":[{"id":1,"title":"[A1] そんな心配","description":"L180: 「そんな心配は完全に無用です。」確認。「それら心配」の残存なし","pre_checked":true},{"id":2,"title":"[A2] つなぎ込み","description":"L209: 「戦略と会社経営の、つなぎ込み」確認。「接続つなぎ込み」の残存なし","pre_checked":true},{"id":3,"title":"[A3] MCP説明付き","description":"L355: 「MCP（AIとツールをつなぐ接続規格）」確認","pre_checked":true},{"id":4,"title":"[A4] 百時間 → 削除済み","description":"「百時間」の残存なし。「100時間」に統一済み","pre_checked":true},{"id":5,"title":"[A5] 2,000時間 → 統一済み","description":"L522/L524/L532に「2,000時間」確認。カンマなし「2000時間」の残存なし","pre_checked":true},{"id":6,"title":"[A6] 半年 → 統一済み","description":"L200/L204/L211/L215/L363/L634に「半年」確認。「2年後」「2年間」の残存なし","pre_checked":true},{"id":7,"title":"[A7] F1-08 → 全削除済み","description":"「F1-08」の残存なし。5箇所削除完了","pre_checked":true},{"id":8,"title":"[A8] F1-07 → 混同なし","description":"「F1-07」の残存なし。F1-08削除後も混在ゼロ","pre_checked":true},{"id":9,"title":"[A9] 21体 → 削除済み","description":"「21体」の残存なし。25体に統一済み","pre_checked":true},{"id":10,"title":"[A10] AI社員 → 削除済み","description":"「AI社員」の残存なし。「AIスタッフ」に統一済み","pre_checked":true},{"id":11,"title":"[A11] 8人体制 → 削除済み","description":"「8人体制」の残存なし。L441: 「常時8〜10体」表現に更新済み","pre_checked":true},{"id":12,"title":"[A12] 800時間 → 存在確認","description":"L436/L441/L610に「累計800時間」確認（3箇所）","pre_checked":true},{"id":13,"title":"[A13] 月に20本/60本 → 削除済み","description":"「月に20本」「60本」の残存なし","pre_checked":true},{"id":14,"title":"[A14] 奨学金 → 全廃済み","description":"「奨学金」の残存ゼロ。廃止確認","pre_checked":true},{"id":15,"title":"[A15] Maxプラン契約 → 明示済み","description":"L474/L484/L490/L491/L492/L578/L633に「Claude Code Maxプラン契約」確認","pre_checked":true},{"id":16,"title":"[A16] ¥110,000（2ヶ月）→ 存在確認","description":"L485: 「10万円＋税（税込 ¥110,000）」/ L579同記載","pre_checked":true},{"id":17,"title":"[A17] ¥132,000（3ヶ月）→ 存在確認","description":"L486: 「12万円＋税（税込 ¥132,000）」/ L580同記載","pre_checked":true},{"id":18,"title":"[A18] FAQ 3件構成 → 確認","description":"faq-item が L417/L421/L425 の3箇所。3件構成確定","pre_checked":true},{"id":19,"title":"[A19] d32f2f 赤色 → 確認","description":"L462/L468/L472に color:#d32f2f 確認。小見出し3本すべて適用済み","pre_checked":true},{"id":20,"title":"[A20] 小見出し①「世界・国内の相場」→ 確認","description":"L462: 「世界・国内の相場、いくらか知っていますか？」","pre_checked":true},{"id":21,"title":"[A22] 小見出し③「ゼロ期だけの特別価格」→ 確認","description":"L472: 「ゼロ期だけの特別価格と、たったひとつの条件。」","pre_checked":true},{"id":22,"title":"[A23] 3ヶ月プラン/12万 → P.P.P.S.整合確認","description":"L476/L483/L486/L580に「3ヶ月プラン」と「12万円＋税」確認","pre_checked":true},{"id":23,"title":"[A24] 講座修了時点 → P.P.P.S.更新確認","description":"L634: 「これが、講座修了時点の、最初のゴールです。」確認","pre_checked":true},{"id":24,"title":"[Q2] 「ある条件」→ 消去確認・整合確認","description":"「ある条件」残存ゼロ。L484に「Claude Code Maxプラン契約（月100ドル・自費）必須／Pro・無料プラン不可」として明示化済み","pre_checked":true}]},{"id":2,"title":"Mits判定済み（2件）","steps":[{"id":25,"title":"[A21] 小見出し②の文言（Mits判定済み）","description":"実物L468: 「今回のAIエージェント講座、20万円としました。」。Mits判定 2026-05-29: 現状維持OK・実物の表現で確定","pre_checked":true},{"id":26,"title":"[Q1] 「2ヶ月グルコン」3箇所残存（Mits判定済み）","description":"L6 title / L174 header-pre / L453 bar-subの3箇所に残存。Mits判定 2026-05-29: 現状維持・3箇所そのまま据え置き","pre_checked":true}]}]};

// ===== INIT =====
function init() {
  loadProgress();
  stepsData = STEPS_DATA;
  // loading要素を削除
  const loadingEl = document.getElementById('loading');
  if (loadingEl) loadingEl.remove();
  // 初回起動時（localStorage 未初期化）に pre_checked: true を自動チェック
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) {
    stepsData.sections.forEach(section => {
      section.steps.forEach(step => {
        if (step.pre_checked) checkedIds.add(step.id);
      });
    });
    saveProgress();
  }
  renderAll();
}

// ===== SERVICE WORKER（無効化・既存SW/キャッシュをunregister） =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
  caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
}

init();
</script>
</body>
</html>
